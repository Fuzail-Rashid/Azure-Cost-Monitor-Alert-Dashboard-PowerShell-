name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  pester-tests:
    name: Pester Tests (PowerShell ${{ matrix.pwsh-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pwsh-version: ["7.2", "7.4"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PowerShell ${{ matrix.pwsh-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path           = "./tests"
          $config.Output.Verbosity   = "Detailed"
          $config.CodeCoverage.Enabled    = $true
          $config.CodeCoverage.Path       = "./src/*.ps1"
          $config.CodeCoverage.OutputPath = "coverage.xml"
          $config.CodeCoverage.OutputFormat = "JaCoCo"
          $config.TestResult.Enabled    = $true
          $config.TestResult.OutputPath = "test-results.xml"
          $config.TestResult.OutputFormat = "NUnitXml"

          $result = Invoke-Pester -Configuration $config

          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) test(s) failed."
            exit 1
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.pwsh-version }}
          path: |
            test-results.xml
            coverage.xml
